<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      (() => {
        const TRACKER_ID = '54f3ced9-93c6-476f-ab30-13f1ca28d19b';
        const TRACKER_SRC = `https://app.nordleads.no/track.js?id=${TRACKER_ID}`;
        const MAX_RETRIES = 12;
        let attempts = 0;
        let loadingScript = null;

        const loadTracker = () => {
          if (window.__nordleadsTrackerLoaded) {
            return;
          }

          if (loadingScript && loadingScript.isConnected) {
            return;
          }

          const existingScript = document.querySelector(`script[src="${TRACKER_SRC}"]`);
          if (existingScript && existingScript.dataset.loaded === 'true') {
            window.__nordleadsTrackerLoaded = true;
            return;
          }

          const script = document.createElement('script');
          script.async = true;
          script.src = TRACKER_SRC;
          script.dataset.loaded = 'false';

          script.onload = () => {
            script.dataset.loaded = 'true';
            window.__nordleadsTrackerLoaded = true;
            loadingScript = null;
          };

          script.onerror = () => {
            loadingScript = null;

            if (attempts >= MAX_RETRIES) {
              return;
            }

            const delay = Math.min(30000, 1000 * 2 ** attempts);
            attempts += 1;
            window.setTimeout(loadTracker, delay);
          };

          loadingScript = script;
          document.head.appendChild(script);
        };

        loadTracker();
        window.addEventListener('online', loadTracker);
      })();
    </script>
    <title>Jugad Singh Boparai - Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
